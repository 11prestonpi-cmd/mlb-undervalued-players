name: Daily MLB Analysis

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
      
      - name: Install packages
        run: install.packages(c("baseballr", "rvest", "tidyverse", "ggplot2"))
        shell: Rscript {0}
      
      - name: Run analysis
        run: Rscript mlb_undervalued_analysis.R
      
      - name: Commit and push results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/
          git commit -m "Daily MLB analysis - $(date)" || true
          git push || true
